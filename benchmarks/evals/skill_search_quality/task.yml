# Skill Search Quality Eval - Task Definition
#
# This eval validates that the skill_search tool correctly identifies
# and ranks relevant skills from the local skill library based on the
# user's task description.
#
# Validation Strategy:
# 1. Check that skill_search tool was called (deterministic jq check)
# 2. Check that all expected_skills appear in the results
# 3. Check that must_be_first skill is ranked #1
#
# No LLM judge is used during eval execution - all validation is deterministic.

before_run:
  # No dependencies to install - pure shell/jq validation
  - echo "Ready to run skill search quality eval"

run:
  # Set provider and model via environment, then run forge
  - FORGE_DEBUG_REQUESTS='{{dir}}/context.json' FORGE_PROVIDER='open_router' FORGE_MODEL='{{model}}' /Users/amit/code-forge/target/debug/forge -p '{{task}}'

parallelism: 3
timeout: 120
early_exit: false

validations:
  - name: "Uses skill_search tool"
    type: shell
    command: |
      cat '{{dir}}/context.json' | jq -e '[.messages[]?.tool_calls[]? | select(.function.name == "skill_search")] | any' > /dev/null 2>&1 || {
        echo "✗ FAILED: skill_search tool was not called"
        exit 1
      }
      echo "✓ skill_search tool was called"

  - name: "Expected skills returned (if specified)"
    type: shell
    command: |
      # NOTE: This check requires a working skill search backend.
      # In CI/test environments without backend access, this is skipped.
      # The primary validation is that skill_search was called (first check).
      
      # Check if we have backend connectivity by looking for tool responses
      # (and not error messages)
      response_text=$(cat '{{dir}}/context.json' | jq -r '
        .messages[]? | 
        select(.role == "tool" and .name == "skill_search") | 
        .content[]? | select(.type == "text") | .text' 2>/dev/null | head -1)
      
      # Check if response is empty, null, or contains an error
      if [ -z "$response_text" ] || [ "$response_text" = "null" ] || echo "$response_text" | grep -q "tool_call_error"; then
        echo "ℹ Skipping expected_skills check - no skill search backend response available"
        exit 0
      fi
      
      # Only check if expected_skills is defined and not empty
      if [ -z "{{expected_skills}}" ]; then
        echo "No expected skills specified, skipping check"
        exit 0
      fi
      
      # Extract skill names from skill_search results
      # The tool returns XML-like content with <skill> elements
      results=$(cat '{{dir}}/context.json' | jq -r '
        .messages[]? | 
        select(.role == "tool" and .name == "skill_search") | 
        .content[]? | select(.type == "text") | .text' 2>/dev/null | tr '<' '\n' | grep '^name>' | cut -d'>' -f2 | cut -d'<' -f1 | head -20)
      
      if [ -z "$results" ]; then
        # Try alternate pattern - skill names in plain text
        results=$(cat '{{dir}}/context.json' | jq -r '
          .messages[]? | 
          select(.role == "tool" and .name == "skill_search") | 
          .content[]? | select(.type == "text") | .text' 2>/dev/null | grep -oE '^[a-z0-9-]+' | head -20)
      fi
      
      if [ -z "$results" ]; then
        echo "No skill_search results found in context"
        exit 0
      fi
      
      # Check each expected skill
      IFS=',' read -ra EXPECTED <<< "{{expected_skills}}"
      missing_skills=()
      for expected in "${EXPECTED[@]}"; do
        expected=$(echo "$expected" | xargs) # trim whitespace
        if ! echo "$results" | grep -qF "$expected"; then
          missing_skills+=("$expected")
        fi
      done
      
      if [ ${#missing_skills[@]} -gt 0 ]; then
        echo "✗ Missing expected skills in results:"
        printf '  - %s\n' "${missing_skills[@]}"
        echo ""
        echo "Actual skills returned:"
        echo "$results" | sed 's/^/  - /'
        exit 1
      fi
      
      echo "✓ All expected skills found in results"
      exit 0

  - name: "Must-be-first skill ranked #1"
    type: shell
    command: |
      # NOTE: This check requires a working skill search backend.
      # In CI/test environments without backend access, this is skipped.
      
      # Check if we have backend connectivity by looking for tool responses
      # (and not error messages)
      response_text=$(cat '{{dir}}/context.json' | jq -r '
        .messages[]? | 
        select(.role == "tool" and .name == "skill_search") | 
        .content[]? | select(.type == "text") | .text' 2>/dev/null | head -1)
      
      # Check if response is empty, null, or contains an error
      if [ -z "$response_text" ] || [ "$response_text" = "null" ] || echo "$response_text" | grep -q "tool_call_error"; then
        echo "ℹ Skipping must_be_first check - no skill search backend response available"
        exit 0
      fi
      
      # Only check if must_be_first is defined
      if [ -z "{{must_be_first}}" ]; then
        echo "No must_be_first requirement, skipping check"
        exit 0
      fi
      
      # Extract first skill from results
      first_skill=$(cat '{{dir}}/context.json' | jq -r '
        .messages[]? | 
        select(.role == "tool" and .name == "skill_search") | 
        .content[]? | select(.type == "text") | .text' 2>/dev/null | tr '<' '\n' | grep '^name>' | cut -d'>' -f2 | cut -d'<' -f1 | head -1)
      
      if [ -z "$first_skill" ]; then
        # Try alternate pattern
        first_skill=$(cat '{{dir}}/context.json' | jq -r '
          .messages[]? | 
          select(.role == "tool" and .name == "skill_search") | 
          .content[]? | select(.type == "text") | .text' 2>/dev/null | grep -oE '^[a-z0-9-]+' | head -1)
      fi
      
      if [ -z "$first_skill" ]; then
        echo "Could not extract first skill from results"
        exit 1
      fi
      
      expected_first="{{must_be_first}}"
      
      if [ "$first_skill" != "$expected_first" ]; then
        echo "✗ First skill mismatch"
        echo "  Expected: $expected_first"
        echo "  Actual:   $first_skill"
        exit 1
      fi
      
      echo "✓ Must-be-first skill is correctly ranked #1: $first_skill"
      exit 0

