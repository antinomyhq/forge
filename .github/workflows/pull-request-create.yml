name: Forge Pull Request Create
env:
  OPENROUTER_API_KEY: ${{secrets.OPENROUTER_API_KEY}}
'on':
  issues:
    types:
    - labeled
permissions:
  contents: write
  issues: read
  pull-requests: write
jobs:
  pull_request_create:
    if: 'github.event.action == ''labeled'' && github.event.label.name == ''forge: pull-request-create'''
    name: pull-request-create
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
    - name: Install Forge
      run: |-
        curl -fsSL https://forgecode.dev/cli | sh
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
        export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
        forge --version
    - name: Get GitHub Issue Details
      run: |-
        gh issue view "${{ github.event.issue.number }}" \
          --json number,title,body,url \
          --jq '"Issue #\(.number): \(.title)\nURL: \(.url)\n\n\(.body // "")"' \
          > .github/forge-issue.md
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Pipe Issue Content To Forge
      run: cat .github/forge-issue.md | forge
    - name: Commit Changes
      run: |-
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git checkout -B "forge/issue-${{ github.event.issue.number }}-pr-create"
        git add .
        forge commit
    - name: Create Pull Request
      run: |-
        git push --set-upstream origin "forge/issue-${{ github.event.issue.number }}-pr-create"
        gh pr create --fill
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Generate PR Description
      run: forge command execute github-pr-description
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
