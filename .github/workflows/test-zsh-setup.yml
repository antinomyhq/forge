name: Test ZSH Setup
'on':
  pull_request:
    types:
    - opened
    - synchronize
    - reopened
    paths:
    - crates/forge_main/src/zsh/**
    - crates/forge_main/src/ui.rs
    - crates/forge_ci/tests/scripts/test-zsh-setup.sh
    - '.github/workflows/test-zsh-setup.yml'
  push:
    branches:
    - main
  workflow_dispatch: {}
jobs:
  test_zsh_setup_amd64:
    name: Test ZSH Setup (amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
    - name: Run ZSH setup test suite
      run: bash crates/forge_ci/tests/scripts/test-zsh-setup.sh --jobs 8
  test_zsh_setup_arm64:
    name: Test ZSH Setup (arm64)
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
    - name: Run ZSH setup test suite (exclude Arch)
      run: bash crates/forge_ci/tests/scripts/test-zsh-setup.sh --exclude "Arch Linux" --jobs 8
concurrency:
  group: test-zsh-setup-${{ github.ref }}
  cancel-in-progress: true
