name: Bounty Management
'on':
  issues:
    types:
    - assigned
    - unassigned
    - labeled
    - unlabeled
  pull_request:
    types:
    - opened
    - edited
    - reopened
  pull_request_target:
    types:
    - closed
permissions:
  issues: write
  pull-requests: write
jobs:
  propagate-bounty-label:
    name: Propagate bounty label to PR
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Copy bounty label from linked issue to PR
      run: npx tsx .github/scripts/bounty/propagate-label.ts --pr ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }}
  sync-claimed-label:
    name: Sync bounty claimed label on assignment
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Add or remove bounty claimed label
      run: npx tsx .github/scripts/bounty/sync-claimed.ts --issue ${{ github.event.issue.number }} --repo ${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }}
  sync-generic-bounty-label:
    name: Sync generic bounty label on value label change
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Add or remove generic bounty label
      run: npx tsx .github/scripts/bounty/sync-generic-bounty.ts --issue ${{ github.event.issue.number }} --repo ${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }}
  mark-bounty-rewarded:
    name: Mark bounty as rewarded on PR merge
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Apply rewarded label to PR and linked issue
      run: npx tsx .github/scripts/bounty/mark-rewarded.ts --pr ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }}
