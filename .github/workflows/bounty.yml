name: Bounty Management
'on':
  issues:
    types:
    - assigned
    - unassigned
    - labeled
    - unlabeled
  pull_request:
    types:
    - opened
    - edited
    - reopened
  pull_request_target:
    types:
    - closed
  schedule:
  - cron: '0 2 * * *'
permissions:
  issues: write
  pull-requests: write
jobs:
  sync-all-issues:
    if: github.event_name == 'issues' || github.event_name == 'schedule'
    name: Sync all bounty issues
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install npm packages
      run: npm install
    - name: Sync all bounty labels
      run: npx tsx .github/scripts/bounty/src/sync-all-issues.ts --repo ${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }} --execute
  sync-all-prs:
    if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target' || github.event_name == 'schedule'
    name: Sync all bounty PRs
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install npm packages
      run: npm install
    - name: Sync all bounty PR labels
      run: npx tsx .github/scripts/bounty/src/sync-all-prs.ts --repo ${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }} --execute
