max_requests_per_turn: 100
max_tool_failure_per_turn: 3
top_p: 0.8
top_k: 30
max_tokens: 20480

# Global compact configuration applied to all agents
compact:
  max_tokens: 2000
  token_threshold: 100000
  retention_window: 6
  message_threshold: 200
  eviction_window: 0.2
  on_turn_end: false

updates:
  frequency: "daily"
  auto_update: false

model:
  model_id: anthropic/claude-sonnet-4
