# Full stack: workspace-server + qdrant + ollama
# Usage: docker compose up -d
#
# If Ollama is already running on the network (e.g. another machine),
# use the override file instead:
#   OLLAMA_URL=http://192.168.31.129:11434 docker compose -f docker-compose.yml -f docker-compose.external-ollama.yml up -d

services:
  workspace-server:
    image: ghcr.io/zetkolink/forgecode/workspace-server:latest
    # To build locally instead of pulling from GHCR, comment the image line
    # above and uncomment the next line:
    # build: .
    ports:
      - "50051:50051"
    environment:
      LISTEN_ADDR: "0.0.0.0:50051"
      QDRANT_URL: "http://qdrant:6334"
      OLLAMA_URL: "http://ollama:11434"
      EMBEDDING_MODEL: "nomic-embed-text"
      EMBEDDING_DIM: "768"
      DB_PATH: "/data/forge-server.db"
      RUST_LOG: "info"
    volumes:
      - server_data:/data
    depends_on:
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  server_data:
  qdrant_data:
  ollama_data:
